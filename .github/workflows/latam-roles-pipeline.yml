name: LATAM Roles Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run against"
        required: true
        type: choice
        options:
          - dev
          - prod
      start_date:
        description: "Start date (YYYY-MM-DD). If empty, previous full month is used."
        required: false
        type: string
      end_date:
        description: "End date (YYYY-MM-DD). If empty, previous full month is used."
        required: false
        type: string
  schedule:
    - cron: "0 3 1 * *" # 03:00 on the 1st of each month

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1
      POSITIONS_CONFIG: positions.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (assume role via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load environment variables
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'prod' }}"
          ENV_FILE=".env.${ENVIRONMENT}"
          if [ ! -f "$ENV_FILE" ]; then
            echo "Env file $ENV_FILE not found. Create it locally with 'make env-${ENVIRONMENT}' and commit or add to secrets."
            exit 1
          fi
          export $(grep -v '^#' "$ENV_FILE" | xargs)
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> $GITHUB_ENV
          echo "GOOGLE_CSE_API_KEY=${GOOGLE_CSE_API_KEY}" >> $GITHUB_ENV
          echo "GOOGLE_CSE_ID=${GOOGLE_CSE_ID}" >> $GITHUB_ENV
          echo "OUTPUT_BUCKET=${OUTPUT_BUCKET}" >> $GITHUB_ENV

      - name: Compute date range
        id: dates
        run: |
          INPUT_START="${{ github.event.inputs.start_date }}"
          INPUT_END="${{ github.event.inputs.end_date }}"

          if [ -n "$INPUT_START" ] && [ -n "$INPUT_END" ]; then
            echo "start_date=$INPUT_START" >> $GITHUB_OUTPUT
            echo "end_date=$INPUT_END" >> $GITHUB_OUTPUT
          else
            # Previous full calendar month in UTC
            NOW=$(date -u +%Y-%m-01)
            LAST_MONTH_END=$(date -u -d "$NOW - 1 day" +%Y-%m-%d)
            LAST_MONTH_START=$(date -u -d "$LAST_MONTH_END" +%Y-%m-01)
            echo "start_date=$LAST_MONTH_START" >> $GITHUB_OUTPUT
            echo "end_date=$LAST_MONTH_END" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline for all positions
        env:
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          GOOGLE_CSE_API_KEY: ${{ env.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_ID: ${{ env.GOOGLE_CSE_ID }}
          OUTPUT_BUCKET: ${{ env.OUTPUT_BUCKET }}
        run: |
          START_DATE="${{ steps.dates.outputs.start_date }}"
          END_DATE="${{ steps.dates.outputs.end_date }}"
          echo "Running pipeline from $START_DATE to $END_DATE"
          python pipeline.py \
            --start-date "$START_DATE" \
            --end-date "$END_DATE" \
            --positions-config "${{ env.POSITIONS_CONFIG }}"

